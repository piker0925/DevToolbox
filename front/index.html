<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <link href="/favicon.svg" rel="icon" type="image/svg+xml"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OnTool</title>
    <script>
        // 테마 FOUC 방지: 앱 로드 전에 저장된 테마(없으면 시스템)를 적용
        (function () {
            try {
                var t = localStorage.getItem('devtoolbox-theme')
                var dark = t === 'dark' || ((t === null || t === 'system')
                    && window.matchMedia('(prefers-color-scheme: dark)').matches)
                if (dark) document.documentElement.classList.add('dark')
            } catch (e) {
            }
        })()
    </script>
    <link crossorigin href="https://cdn.jsdelivr.net" rel="preconnect"/>
    <link as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
          onload="this.rel='stylesheet'"
          rel="stylesheet"/>
    <noscript>
        <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
              rel="stylesheet"/>
    </noscript>
</head>
<body>
<div id="app"></div>
<script src="/src/main.ts" type="module"></script>
</body>
</html>
